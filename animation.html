<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Natural Scene</title>

<style>
body{
    margin:0;
    overflow:hidden;
    height:100vh;
    background:linear-gradient(to top,#1e6b2d,#87ceeb);
}

/* SUN */
.sun{
    position:absolute;
    top:60px;
    right:100px;
    width:100px;
    height:100px;
    background:yellow;
    border-radius:50%;
    box-shadow:0 0 50px yellow;
}

/* CLOUD */
.cloud{
    position:absolute;
    width:120px;
    height:60px;
    background:white;
    border-radius:50px;
    opacity:0.9;
    animation:moveCloud 20s linear infinite;
}

.cloud::before,
.cloud::after{
    content:"";
    position:absolute;
    background:white;
    border-radius:50%;
}

.cloud::before{
    width:60px;
    height:60px;
    top:-20px;
    left:10px;
}

.cloud::after{
    width:70px;
    height:70px;
    top:-25px;
    left:50px;
}

/* GRASS */
.grass{
    position:absolute;
    bottom:0;
    width:100%;
    height:80px;
    background:linear-gradient(to top,#0b3d16,#1e6b2d);
}

/* 🌳 TREE (your original improved version) */
.tree{
    position:absolute;
    bottom:80px;
    width:20px;
    height:90px;
    background:#5d3a1a;
    border-radius:5px;
}

/* .tree::before{
    content:"";
    position:absolute;
    bottom:60px;
    left:-30px;
    width:80px;
    height:80px;
    background:green;
    border-radius:50%;
    box-shadow:0 0 10px green;
} */

/* 🏡 HOUSE */
.house{
    position:absolute;
    bottom:80px;
    left:250px;
    width:120px;
    height:90px;
    background:#d9a066;
    border:2px solid #8b5a2b;
}

/* roof */
.house::before{
    content:"";
    position:absolute;
    top:-60px;
    left:-10px;
    width:0;
    height:0;
    border-left:70px solid transparent;
    border-right:70px solid transparent;
    border-bottom:60px solid #b22222;
}

/* door */
.door{
    position:absolute;
    bottom:0;
    left:45px;
    width:30px;
    height:50px;
    background:#4b2e16;
}

/* 🐦 NEW REALISTIC BIRD */
.bird{
    position:absolute;
    top:120px;
    left:-80px;
    width:40px;
    height:20px;
    animation:fly 10s linear infinite;
}

/* wings */
.bird::before,
.bird::after{
    content:"";
    position:absolute;
    width:20px;
    height:10px;
    border:2px solid black;
    border-top:none;
    border-left:none;
    transform-origin:center;
    animation:flap 0.3s infinite alternate;
}

/* left wing */
.bird::before{
    left:0;
    transform:rotate(-20deg);
}

/* right wing */
.bird::after{
    right:0;
    transform:rotate(20deg);
}

/* animations */
@keyframes moveCloud{
    from{left:-200px;}
    to{left:110%;}
}

@keyframes fly{
    from{
        left:-100px;
        top:140px;
    }
    to{
        left:110%;
        top:80px;
    }
}

@keyframes flap{
    from{transform:rotate(-20deg) scaleY(1);}
    to{transform:rotate(-20deg) scaleY(0.4);}
}
</style>
</head>

<body>

<div class="sun"></div>

<div class="cloud" style="top:80px; animation-duration:25s;"></div>
<div class="cloud" style="top:140px; animation-duration:18s;"></div>

<div class="grass"></div>

<div class="tree" style="left:80px;"></div>
<div class="tree" style="left:140px;"></div>
<div class="tree" style="left:380px;"></div>

<div class="house">
    <div class="door"></div>
</div>

<div class="bird"></div>

</body>
</html>
