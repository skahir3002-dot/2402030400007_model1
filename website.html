<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FASHION PRO STORE</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

:root{
  --gold:#b08d57;
  --dark:#111;
  --bg:#f7f3ef;
  --border:#e7dfd6;
}

body{
  background:var(--bg);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#fff;
  position:sticky;
  top:0;
  z-index:1000;
  border-bottom:1px solid var(--border);
}

.logo{
  font-size:24px;
  font-weight:bold;
  color:var(--gold);
  letter-spacing:4px;
}

nav{
  display:flex;
  gap:15px;
}

nav a{
  text-decoration:none;
  color:#222;
}

nav a:hover{color:var(--gold);}

/* HERO */
.hero{
  height:80vh;
  background:url('https://images.unsplash.com/photo-1520975958225-20f61b9e5f3a') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#fff;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.6);
}

.hero-content{position:relative;z-index:2;}

.hero h1{font-size:55px;}

.hero button{
  margin-top:15px;
  padding:12px 25px;
  background:var(--gold);
  border:none;
  color:#fff;
  cursor:pointer;
  border-radius:6px;
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:20px;
  flex-wrap:wrap;
}

input,select{
  padding:10px;
  border:1px solid var(--border);
  border-radius:6px;
}

/* MAIN LAYOUT */
.main{
  display:flex;
  gap:20px;
  padding:20px;
  align-items:flex-start;
}

/* PRODUCTS */
.products{
  flex:1;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  border:1px solid var(--border);
  transition:0.3s;
}

.card:hover{transform:translateY(-5px);}

.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}

.card-content{padding:10px;}

.price{color:var(--gold);font-weight:bold;}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  background:#111;
  color:#fff;
  cursor:pointer;
}

button:hover{background:var(--gold);}

/* CART WRAPPER */
.cart-wrapper{
  width:320px;
}

/* STICKY CART */
.cart{
  position:sticky;
  top:100px;
  background:#fff;
  border:1px solid var(--border);
  padding:15px;
  border-radius:10px;
  max-height:70vh;
  overflow-y:auto;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin:8px 0;
  border-bottom:1px solid #eee;
  padding-bottom:5px;
}

.total{
  margin-top:15px;
  font-weight:bold;
  color:var(--gold);
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111;
  color:#fff;
  padding:10px 15px;
  border-radius:6px;
  display:none;
}

/* MOBILE */
@media(max-width:900px){
  .main{flex-direction:column;}
  .cart-wrapper{width:100%;}
}
</style>
</head>

<body>

<header>
  <div class="logo">FASHION</div>
  <nav>
    <a href="#">Home</a>
    <a href="#shop">Shop</a>
    <a href="#">Men</a>
    <a href="#">Women</a>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>PREMIUM FASHION</h1>
    <p>Modern luxury style</p>
    <button onclick="scrollToShop()">Shop Now</button>
  </div>
</section>

<div class="controls">
  <input id="search" placeholder="Search..." onkeyup="render()">
  <select id="filter" onchange="render()">
    <option value="all">All</option>
    <option value="low">Below 1000</option>
    <option value="high">Above 1000</option>
  </select>
</div>

<div class="main">

  <!-- PRODUCTS -->
  <section id="shop" class="products"></section>

  <!-- CART -->
  <div class="cart-wrapper">
    <div class="cart">
      <h3>Cart 🛒</h3>
      <div id="cart"></div>
      <div class="total" id="total"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function showToast(msg){
 const t=document.getElementById("toast");
 t.innerText=msg;
 t.style.display="block";
 setTimeout(()=>t.style.display="none",1500);
}

function render(){
 const q=document.getElementById("search").value.toLowerCase();
 const f=document.getElementById("filter").value;

 let list=products.filter(p=>p.name.toLowerCase().includes(q));

 if(f=="low") list=list.filter(p=>p.price<1000);
 if(f=="high") list=list.filter(p=>p.price>=1000);

 const box=document.getElementById("shop");
 box.innerHTML="";

 list.forEach(p=>{
  box.innerHTML+=`
   <div class="card">
     <img src="${p.img}">
     <div class="card-content">
       <h4>${p.name}</h4>
       <div class="price">₹${p.price}</div>
       <button onclick="add(${p.id})">Add to Cart</button>
     </div>
   </div>`;
 });
}

function add(id){
 const item=products.find(p=>p.id===id);
 cart.push(item);
 localStorage.setItem("cart",JSON.stringify(cart));
 showToast("Added to cart");
 renderCart();
}

function removeItem(index){
 cart.splice(index,1);
 localStorage.setItem("cart",JSON.stringify(cart));
 renderCart();
}

function renderCart(){
 const box=document.getElementById("cart");
 box.innerHTML="";
 let total=0;

 cart.forEach((c,i)=>{
  total+=c.price;
  box.innerHTML+=`
   <div class="cart-item">
     <span>${c.name}</span>
     <span>₹${c.price} <button onclick="removeItem(${i})">X</button></span>
   </div>`;
