<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            margin: 30px auto;
            padding: 20px;
            width: 200px;
            border-radius: 15px;
            background-color:aliceblue ;
            height: 500px;

        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">REGISTRATION FORM </h1>
    <div>
    <form>
        <label for="name">NAME:</label>
        <input type="text" name="name" id="name" placeholder="enter name"><br>
        <br>

        <label for="email">EMAIL:</label>
        <input type="email" name="email" id="email" placeholder="enter email"><br>
        <br>

        <label for="password">PASSWORD:</label>
        <input type="number" name="password" id="password" placeholder="valid password"><br>
        <br>

        <label for="contect">CONTECT NO.:</label>
        <input type="number" name="contect" id="contect" placeholder=" enter number"><br>
        <br>

        <label for="address">ADDRESS:</label>
        <textarea name="address" id="address"></textarea><br><br>

        <label for="state">State:</label>
        <select name="state" id="state">
            <option value="gujrat">Gujrat</option>
            <option value="rajsthan">Rajsthan</option>
            <option value="maharastra">Maharastra</option>
            <option value="kerala">Kerala</option>
            <option value="Panjab">Panjab</option>
        </select><br><br>
        <label for="gender">Gender:</label>

        <label for="male">Male</label>
        <input type="radio" name="gender" id="male">

        <label for="female">Female</label>
        <input type="radio" name="gender" id="female"><br><br>

        <label for="hobby">Hobbies:</label><br>

         <input type="checkbox" name="hobby" id="hobby1">
        <label for="hobby1"> Reading</label><br>
       
        <input type="checkbox" name="hobby" id="hobby2">
        <label for="hobby2"> dancing</label><br>
        
        <input type="checkbox" name="hobby" id="hobby3">
        <label for="hobby3"> writing</label><br>
       
        <br>
      <input type="submit" style="text-align: center; background-color:lightslategray; width: 190px;">
    </form>
    </div>
</body>
</html>
