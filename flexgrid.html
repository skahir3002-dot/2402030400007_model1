<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .container {
        display:flex;
        background-color: rgb(200, 193, 150);
        justify-content:space-between;
        flex-direction:row;
         border-radius: 8px;
    }
    .container div{
         border-radius: 8px;
        width: 200px;
        height:30px;
        padding: 5px;
        margin: 5px;
        text-align: center;
        background-color:rgb(255, 255, 255);
    }
    .container div:hover{
      background-color: rgb(118, 102, 127);
      font-family: cursive;
    }
    .containergrid{
        display: grid;
        justify-content: space-around;
        background-color: rgb(200, 193, 150);
        border-radius: 8px;
        grid-template-columns:auto auto auto ;
    }
    .containergrid div{
         border-radius: 8px;
        width: 200px;
        height:30px;
        padding: 5px;
        margin: 5px;
        text-align: center;
        background-color: rgb(255, 255, 255);
        gap: calc();
         
    }
       .containergrid div:hover{
        background-color: rgb(118, 102, 127);
         font-family: cursive;
       }
    
    </style>
    </div>
</head>
<body>
    <h1 style="background-color: rgb(198, 179, 156); border-radius: 10px; text-align: center;">Flex & Grid Layout</h1>
    <h2>Flex Layout:</h2>
    <div class="container">
        <div>flex 1</div>
        <div>flex 2</div>
        <div>flex 3</div>
    </div> <br> <br>
    <h3>Grid Layout:</h3>
    <div class="containergrid">
        <div>grid 1</div>
        <div>grid 2</div>
        <div>grid 3</div>
    </div>
</body>
</html>
