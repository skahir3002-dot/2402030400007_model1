<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gray Layout</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e5e5e5;
}

/* Header */
header {
    background: #333;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

/* Layout container */
.container {
    display: flex;
    height: calc(100vh - 110px);
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #555;
    color: white;
    padding: 20px;
}

/* Sidebar links */
.sidebar a {
    display: block;
    color: #ddd;
    padding: 10px;
    margin-bottom: 5px;
    background: #666;
    border-radius: 5px;
}

.sidebar a:hover {
    background: #777;
}

/* Main content */
.main {
    flex: 1;
    padding: 20px;
    background: #d9d9d9;
}

/* Cards */
.card {
    background: #f2f2f2;
    padding: 15px;
    margin-bottom: 150px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

/* Footer */
footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<header>
    Gray Layout Example
</header>

<div class="container">
    
    <div class="sidebar">
        <h3>Menu</h3>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>

    <div class="main">
        <div class="card">This is content box 1</div>
        <div class="card">This is content box 2</div>
        <div class="card">This is content box 3</div>
    </div>

</div>

<footer>
    © 2026 Gray Layout Design
</footer>

</body>
</html>
